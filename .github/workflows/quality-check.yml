name: Quality Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  spell-check:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g cspell@latest

      - run: cspell lint "**/*.html" --no-progress

  html-validate:
    name: HTML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g html-validate

      - run: html-validate "**/*.html"

  link-and-image-check:
    name: Links and images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --base . --no-progress '**/*.html'
          fail: true
